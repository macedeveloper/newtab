<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page -->
    <title>Новая вкладка</title>
    <meta name="description" content="Новая вкладка">
    <link rel="icon" href="assets/favicon.png" type="image/png">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="window" id="window">

        <!-- Title -->
        <div class="window-title">
            <h1 class="title">Новая вкладка</h1>
            <img class="window-buttons" src="assets/window-buttons.svg" height="36px" draggable="false">
        </div>
        
        <!-- Time -->
        <div class="window-time">
            <p id="time_display"> 00:00 </p>
            <p id="time_display_sec"> :00 </p>
        </div>
        
        <!-- Search -->
        <div class="window-search-div">
            <input role="combobox" autocomplete="off" id="searchbox_input" placeholder="Введите запрос или URL"
                minlength="1" type="text" style="flex-grow: 1;">
            </input>
            <button id="searchbox_clear">
                <img src="assets/searchbox_clear.svg", draggable="false">
            </button>
            <a id="searchbox_lens" href="https://images.google.com">
                <img src="assets/searchbox_lens.svg", draggable="false">
            </a>
            <button id="searchbox_go">
                <img src="assets/searchbox_go.svg", draggable="false">
            </button>
        </div>
        
        <!-- Favs -->
        <div class="window-content" id="window-content">
            <div class="page_scroll" id="page_scroll_left"><i class="bi bi-arrow-left"></i></div>
            <div class="page_scroll" id="page_scroll_right"><i class="bi bi-arrow-right"></i></div>
        </div>

    </div>

    <script src="scripts/addfavs.js"></script>
    <script src="scripts/time.js"></script>
    <script src="scripts/search.js"></script>
    <!-- <script src="scripts/bgchange.js"></script> -->

</body>

</html>
