<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page -->
    <title>Новая вкладка</title>
    <meta name="description" content="Новая вкладка">
    <link rel="icon" href="assets/icon.png" type="image/png">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="window" id="window">

        <!-- Title -->
        <div class="window-title">
            <h1 class="title">Новая вкладка</h1>
            <img class="window-buttons" src="assets/window-buttons.svg" height="36px" draggable="false">
        </div>
        
        <!-- Time -->
        <div style="display: flex; flex-direction: row; align-items: bottom; justify-content: center;">
            <p id="time_display" style="user-select: none; font-weight: 100; font-size: 64px; color: white; margin: 0; "> 00:00 </p>
            <p id="time_display_sec" style="user-select: none; font-weight: 400; font-size: 24px; color: #d4d6fb88; margin: 0; margin-top: 11px;"> :00 </p>
        </div>
        
        <!-- Search -->
        <div class="window-search-div">
            <input role="combobox" autocomplete="off" id="searchbox_input" placeholder="Введите запрос или URL"
                minlength="1" type="text" style="flex-grow: 1;">
            </input>
            <button id="searchbox_clear">
                <i class="bi bi-x-lg"></i>
            </button>
            <button id="searchbox_button">
                <i class="bi bi-search"></i>
            </button>
        </div>
        
        <!-- Favs -->
        <div class="window-content" id="window-content">
            
        </div>

    </div>

    <!--
        TODO:
        - redraw arrows for page scrolling
        - readd newyear background gimmick
    -->

    <script src="scripts/addfavs.js"></script>
    <script src="scripts/time.js"></script>
    <script src="scripts/search.js"></script>
    <!-- <script src="scripts/bgchange.js"></script> -->

</body>

</html>
